name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Run ruff
        run: ruff check gbe/ tests/ scripts/ dashboard/

  shellcheck:
    name: Shell scripts (shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck bin/*.sh run.sh

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (HDF5 / NetCDF4)
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libhdf5-dev libnetcdf-dev

      - name: Install Python dependencies
        timeout-minutes: 8
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate sample fixtures
        timeout-minutes: 2
        run: python scripts/generate_sample.py

      - name: Run test suite
        timeout-minutes: 10
        run: pytest -v --tb=short tests/

      - name: Run end-to-end demo
        timeout-minutes: 5
        run: python -m scripts.demo_from_sample

      - name: Verify archive fixity
        timeout-minutes: 3
        run: bash bin/verify_archive.sh archive/daily

      - name: Coverage report
        if: matrix.python-version == '3.11'
        run: pytest --cov=gbe --cov-report=xml --cov-report=term-missing tests/

  build:
    name: Package build check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel .

      - name: List artifacts
        run: ls -lh dist/
